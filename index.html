<script>
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);
const fmt = v => 'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const todayStr = () => new Date().toISOString().slice(0,10);
const nowStr = () => new Date().toISOString().replace('T',' ').slice(0,19);
const fmtDate = d => { if(!d) return ''; const p=d.slice(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };
const fmtDateTime = d => { if(!d) return ''; return fmtDate(d)+' '+d.slice(11,16); };
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const addMonths = (d,n) => { const dt=new Date(d); dt.setMonth(dt.getMonth()+n); return dt.toISOString().slice(0,10); };
const addDays = (d,n) => { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const el = id => document.getElementById(id);
const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const toast = msg => { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); };
const fmtPhone = raw => { const d=raw.replace(/\D/g,'').replace(/^55/,''); if(d.length===11) return '+55 '+d.slice(0,2)+' '+d.slice(2,7)+'-'+d.slice(7); if(d.length===10) return '+55 '+d.slice(0,2)+' '+d.slice(2,6)+'-'+d.slice(6); return raw; };
const savePhone = raw => { const d=raw.replace(/\D/g,''); if(d.startsWith('55')&&d.length>=12) return '+'+d; if(d.length>=10) return '+55'+d; return raw; };

let clientes=[], produtos=[], vendas=[], parcelas=[];

var currentUser = null;

function hashSenha(s){
  // Hash simples para nao salvar senha em texto puro
  var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return 'h'+Math.abs(h).toString(36);
}
function salvarSessao(u){
  currentUser=u;
  try{localStorage.setItem('jc_user',JSON.stringify({id:u.id,nome:u.nome,email:u.email,admin:u.admin,trial_ate:u.trial_ate}));}catch(e){}
}
function limparSessao(){
  currentUser=null;
  try{localStorage.removeItem('jc_user');}catch(e){}
}
function carregarSessao(){
  try{var s=localStorage.getItem('jc_user');if(s)currentUser=JSON.parse(s);}catch(e){}
  return currentUser;
}
function isTrialValido(u){
  if(u.admin)return true;
  if(!u.trial_ate)return false;
  return new Date(u.trial_ate)>=new Date();
}

var hideVals=false;

  return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}

function renderLoginScreen(){
  var ls=document.getElementById('loginScreen');

    '<button class="login-tab '+(!isLogin?'active':'')+'" onclick="LOGIN_TAB=\'cadastro\';renderLoginScreen()">Cadastrar</button>'+
    '</div>'+
    (!isLogin?'<div class="trial-badge">&#x1F381; 30 dias grátis para novos usuários!</div>':'')+
    (!isLogin?'<div class="fg"><label class="flabel">Nome</label><input class="finput" id="lgNome" placeholder="Seu nome"></div>':'')+
    '<div class="fg"><label class="flabel">Email</label><input class="finput" id="lgEmail" type="email" placeholder="seu@email.com" autocomplete="email"></div>'+
    '<div class="fg"><label class="flabel">Senha</label><input class="finput" id="lgSenha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="'+(isLogin?'current-password':'new-password')+'"></div>'+
    '<button class="btn btn-pri" id="btnLogin" onclick="'+(isLogin?'fazerLogin()':'fazerCadastro()')+'">'+
    (isLogin?'Entrar':'Criar conta grátis')+'</button>'+
    (isLogin?'<p style="text-align:center;font-size:11px;color:var(--gray);margin-top:14px">Não tem conta? <button onclick="LOGIN_TAB=\'cadastro\';renderLoginScreen()" style="background:none;border:none;color:var(--org);font-weight:700;cursor:pointer;font-family:Poppins,sans-serif">Cadastre-se</button></p>':'')+
    '</div>';
}

async function fazerLogin(){
  var btn=document.getElementById('btnLogin');if(btn)btn.disabled=true;
  var email=(document.getElementById('lgEmail')?.value||'').trim().toLowerCase();
  var senha=document.getElementById('lgSenha')?.value||'';
  if(!email||!senha){alert('Preencha email e senha');if(btn)btn.disabled=false;return;}
  var hash=hashSenha(senha);
  var res=await supa.from('usuarios').select('*').eq('email',email).eq('senha',hash).single();
  if(res.error||!res.data){
    alert('Email ou senha incorretos');if(btn)btn.disabled=false;return;
  }
  var u=res.data;
  if(!u.ativo){alert('Conta desativada. Entre em contato.');if(btn)btn.disabled=false;return;}
  if(!isTrialValido(u)){alert('Seu período gratuito expirou. Entre em contato para renovar.');if(btn)btn.disabled=false;return;}
  salvarSessao(u);
  await iniciarApp();
}

async function fazerCadastro(){
  var btn=document.getElementById('btnLogin');if(btn)btn.disabled=true;
  var nome=(document.getElementById('lgNome')?.value||'').trim();
  var email=(document.getElementById('lgEmail')?.value||'').trim().toLowerCase();
  var senha=document.getElementById('lgSenha')?.value||'';
  if(!nome||!email||!senha){alert('Preencha todos os campos');if(btn)btn.disabled=false;return;}
  if(senha.length<6){alert('Senha deve ter pelo menos 6 caracteres');if(btn)btn.disabled=false;return;}
  // Verificar se email já existe
  var chk=await supa.from('usuarios').select('id').eq('email',email);
  if(chk.data&&chk.data.length>0){alert('Este email já está cadastrado');if(btn)btn.disabled=false;return;}
  var trial=new Date();trial.setDate(trial.getDate()+30);
  var novoUser={id:genId(),email:email,nome:nome,senha:hashSenha(senha),admin:false,trial_ate:trial.toISOString().slice(0,10),ativo:true};
  var ins=await supa.from('usuarios').insert(novoUser);
  if(ins.error){alert('Erro ao cadastrar: '+ins.error.message);if(btn)btn.disabled=false;return;}
  salvarSessao(novoUser);
  await iniciarApp();
}

function fazerLogout(){
  limparSessao();
  clientes=[];produtos=[];vendas=[];parcelas=[];

let screen='home', param=null, finTab='hoje';
let homeFilter='mes', homeDe='', homeAte='';
let vendasFilter='mes', vendasDe='', vendasAte='';
let relMes=todayStr().slice(0,7);

// ── DB ──────────────────────────────────────────────────
async function loadAll(){
  const [rc,rp,rv,rpa]=await Promise.all([supa.from('clientes').select('*'),supa.from('produtos').select('*'),supa.from('vendas').select('*').order('numero',{ascending:false}),supa.from('parcelas').select('*')]);
  clientes=rc.data||[]; produtos=rp.data||[]; vendas=rv.data||[]; parcelas=rpa.data||[];
  if(!clientes.length){await addCliente({nome:'Ana Silva',telefone:'+5519991234567'});}
  if(!produtos.length){await addProduto({nome:'IPTV Mensal',preco:35,custo:0});await addProduto({nome:'Emprestimo',preco:100,custo:0});}
}
async function addCliente(d){const o={id:genId(),user_id:currentUser?.id,...d};await supa.from('clientes').insert(o);clientes.push(o);return o;}
async function delCliente(id){
  var cl=clientes.find(function(x){return x.id===id;});
  if(!cl)return;
  if(!confirm('Excluir '+cl.nome+'?'))return;
  await supa.from('clientes').delete().eq('id',id);
  clientes=clientes.filter(function(x){return x.id!==id;});
  renderScreen();toast('Excluido!');
}

async function updCliente(id,d){await supa.from('clientes').update(d).eq('id',id);const i=clientes.findIndex(c=>c.id===id);if(i>=0)clientes[i]={...clientes[i],...d};}
async function addProduto(d){const o={id:genId(),custo:0,user_id:currentUser?.id,...d};await supa.from('produtos').insert(o);produtos.push(o);return o;}
async function updProduto(id,d){await supa.from('produtos').update(d).eq('id',id);const i=produtos.findIndex(p=>p.id===id);if(i>=0)produtos[i]={...produtos[i],...d};}
async function addVenda(d){d.user_id=currentUser?.id;await supa.from('vendas').insert(d);vendas.unshift(d);}
async function addParcela(d){await supa.from('parcelas').insert(d);parcelas.push(d);return d;}
async function updParcela(id,upd){await supa.from('parcelas').update(upd).eq('id',id);const i=parcelas.findIndex(p=>p.id===id);if(i>=0)parcelas[i]={...parcelas[i],...upd};}
async function delParcela(id){await supa.from('parcelas').delete().eq('id',id);parcelas=parcelas.filter(p=>p.id!==id);}
async function delVenda(id){await supa.from('parcelas').delete().eq('vendaid',id);await supa.from('vendas').delete().eq('id',id);vendas=vendas.filter(v=>v.id!==id);parcelas=parcelas.filter(p=>p.vendaid!==id);}

function updBadge(){const t=todayStr();const c=parcelas.filter(p=>!p.pago&&p.vencimento<=t).length;const b=el('finBadge');if(b){b.style.display=c>0?'block':'none';b.textContent=c;}}
function nav(s,p2){screen=s;if(p2!==undefined)param=p2;const titles={home:'JuliusCredit',vendas:'Vendas',financeiro:'Financeiro',clientes:'Clientes',produtos:'Produtos',relatorios:'Relatorios',mais:'Mais','nova-venda':'Nova Venda','venda-detail':'Detalhes da Venda','venda-parcelas':'Parcelas',configuracoes:'Configurações',conta:'Conta',empresa:'Empresa','meu-plano':'Meu Plano',gestor:'Gestor'};el('hdrTitle').textContent=titles[s]||'JuliusCredit';const hasBack=['nova-venda','venda-detail','venda-parcelas','produtos','relatorios','configuracoes','conta','empresa','meu-plano','gestor'].includes(s);el('btnBack').style.display=hasBack?'flex':'none';el('bnav').style.display=['nova-venda','venda-detail','venda-parcelas'].includes(s)?'none':'flex';el('hdrRight').innerHTML=s==='home'?'<button class="eye-btn" onclick="togglePrivacy()">'+eyeSVG()+'</button>':'';['home','vendas','financeiro','clientes','mais'].forEach(x=>{const n=el('nav-'+x);if(n)n.classList.toggle('active',x===s||(x==='mais'&&['produtos','relatorios','mais'].includes(s)));});updBadge();
  var fs=el('fixedSalvar');if(fs)fs.style.display=(s==='venda-parcelas'?'block':'none');
  pendingChanges={};
  renderScreen();}
function goBack(){const b={produtos:'mais',relatorios:'mais','venda-detail':'vendas','venda-parcelas':'venda-detail','nova-venda':'vendas',configuracoes:'mais',conta:'configuracoes',empresa:'configuracoes','meu-plano':'mais',gestor:'mais'};nav(b[screen]||'home');}
function closeModal(id){const m=el(id);if(m)m.remove();}
function renderScreen(){const c=el('content');if(!c)return;if(screen==='home')c.innerHTML=renderHome();else if(screen==='vendas')c.innerHTML=renderVendas();else if(screen==='financeiro')c.innerHTML=renderFin();else if(screen==='clientes')c.innerHTML=renderClientes();else if(screen==='produtos')c.innerHTML=renderProdutos();else if(screen==='relatorios')c.innerHTML=renderRelatorios();else if(screen==='mais')c.innerHTML=renderMais();else if(screen==='nova-venda')c.innerHTML=renderWiz();else if(screen==='venda-detail')c.innerHTML=renderDetail();else if(screen==='venda-parcelas')c.innerHTML=renderParcelas();
  else if(screen==='configuracoes')c.innerHTML=renderConfiguracoes();
  else if(screen==='conta')c.innerHTML=renderConta();
  else if(screen==='empresa')c.innerHTML=renderEmpresa();
  else if(screen==='meu-plano')c.innerHTML=renderMeuPlano();

// ── HOME ────────────────────────────────────────────────
function getHomeRange(){const t=todayStr();const mes=t.slice(0,7);const ano=t.slice(0,4);if(homeFilter==='mes')return{de:mes+'-01',ate:mes+'-31'};if(homeFilter==='ano')return{de:ano+'-01-01',ate:ano+'-12-31'};return{de:homeDe||t,ate:homeAte||t};}
function renderHome(){
  const t=todayStr();const mes=t.slice(0,7);const r=getHomeRange();
  const totalR=parcelas.filter(p=>!p.pago&&p.vencimento>=r.de&&p.vencimento<=r.ate).reduce((s,p)=>s+(p.valor||0),0);
  const nH=parcelas.filter(p=>p.vencimento===t&&!p.pago).length;
  const nA=parcelas.filter(p=>p.vencimento<t&&!p.pago).length;
  const tMes=vendas.filter(v=>v.data&&v.data.slice(0,7)===mes).reduce((s,v)=>s+(v.total||0),0);
  const tRec=parcelas.filter(p=>p.pago&&p.datapagamento&&p.datapagamento.slice(0,7)===mes).reduce((s,p)=>s+(p.valor||0),0);
  const ults=vendas.slice(0,6);
  let vRows='';
  ults.forEach(v=>{const cli=clientes.find(c=>c.id===v.clienteid);const pe=parcelas.filter(p=>p.vendaid===v.id&&!p.pago);const atr=pe.some(p=>p.vencimento<t);vRows+=`<div class="litem cp" onclick="nav('venda-detail','${v.id}')"><div><div class="lname">${atr?'&#9872; ':''}${escH(cli?cli.nome:'—')}</div><div class="lsub">${fmtDate(v.data)} · ${escH(v.produto)}</div></div><div style="text-align:right"><div class="lval">${fmt(v.total)}</div><div class="lbadge">${pe.length>0?'<span class="tag-red">'+pe.length+' pend.</span>':'<span class="tag-grn">Quitado</span>'}</div></div></div>`;});
  return `<div class="ohdr"><div class="olabel">Total a Receber — ${homeFilter==='mes'?'Mês':homeFilter==='ano'?'Ano':'Período'}</div><div class="ototal">${fmt(totalR)}</div><div class="filter-tabs"><button class="ftab ${homeFilter==='mes'?'on':''}" onclick="homeFilter='mes';renderScreen()">Mês</button><button class="ftab ${homeFilter==='ano'?'on':''}" onclick="homeFilter='ano';renderScreen()">Ano</button><button class="ftab ${homeFilter==='periodo'?'on':''}" onclick="homeFilter='periodo';renderScreen()">Período</button></div>${homeFilter==='periodo'?`<div class="periodo-inputs"><input type="date" value="${homeDe}" onchange="homeDe=this.value;renderScreen()"><input type="date" value="${homeAte}" onchange="homeAte=this.value;renderScreen()"></div>`:''}<div class="ostats"><div class="ostat" onclick="finTab='hoje';nav('financeiro')"><div class="ostat-n">${nH}</div><div class="ostat-l">Vencem Hoje</div></div><div class="odivider"></div><div class="ostat" onclick="finTab='atraso';nav('financeiro')"><div class="ostat-n" style="color:${nA?'#FFD1A9':'#fff'}">${nA}</div><div class="ostat-l">Em Atraso</div></div><div class="odivider"></div><div class="ostat"><div class="ostat-n">${clientes.length}</div><div class="ostat-l">Clientes</div></div></div></div>
  <div class="card4"><div class="scard"><div class="sicon" style="background:#FFF3EB">&#x1F4B0;</div><div class="slabel">Vendas do Mês</div><div class="sval">${fmt(tMes)}</div></div><div class="scard"><div class="sicon" style="background:#D1FAE5">&#x2705;</div><div class="slabel">Recebido Mês</div><div class="sval" style="color:var(--grn)">${fmt(tRec)}</div></div><div class="scard" onclick="nav('clientes')" style="cursor:pointer"><div class="sicon" style="background:#EDE9FE">&#x1F464;</div><div class="slabel">Clientes</div><div class="sval">${clientes.length}</div></div><div class="scard" onclick="nav('produtos')" style="cursor:pointer"><div class="sicon" style="background:#DBEAFE">&#x1F4E6;</div><div class="slabel">Produtos</div><div class="sval">${produtos.length}</div></div></div>
  <div class="sec"><span class="sectit">Últimas Vendas</span><button class="seclink" onclick="nav('vendas')">Ver todas</button></div>
  ${ults.length?`<div class="lwrap">${vRows}</div>`:`<div class="card"><div class="empty"><div class="empty-ic">&#x1F4CB;</div><div class="empty-tx">Nenhuma venda ainda</div></div></div>`}`;
}

function renderVendas(){
  const t=todayStr();const mes=t.slice(0,7);const ano=t.slice(0,4);
  let filtered=vendas;
  if(vendasFilter==='mes')filtered=vendas.filter(v=>v.data&&v.data.slice(0,7)===mes);
  else if(vendasFilter==='ano')filtered=vendas.filter(v=>v.data&&v.data.slice(0,4)===ano);
  else if(vendasFilter==='periodo'&&vendasDe&&vendasAte)filtered=vendas.filter(v=>v.data&&v.data>=vendasDe&&v.data<=vendasAte);

function renderFin(){
  const t=todayStr();
  const atraso=parcelas.filter(p=>p.vencimento<t&&!p.pago).sort((a,b)=>a.vencimento.localeCompare(b.vencimento));
  const avencer=parcelas.filter(p=>p.vencimento>=t&&!p.pago).sort((a,b)=>a.vencimento.localeCompare(b.vencimento));
  const list=finTab==='atraso'?atraso:avencer;
  const total=list.reduce((s,p)=>s+(p.valor||0),0);
  const byDate={};
  list.forEach(p=>{if(!byDate[p.vencimento])byDate[p.vencimento]=[];byDate[p.vencimento].push(p);});
  let rows='';
  Object.keys(byDate).sort().forEach(date=>{
    rows+=`<div class="date-sep">${fmtDate(date)}${date===t?' — Hoje':''}</div><div class="lwrap">`;
    byDate[date].forEach(p=>{
      const v=vendas.find(x=>x.id===p.vendaid);const cli=clientes.find(c=>c.id===v?.clienteid);
      const totalParc=parcelas.filter(x=>x.vendaid===p.vendaid).length;

      rows+=`<div class="fitem" onclick="openFinParcela('${p.id}')"><div class="ftop"><div><div class="fname">${escH(cli?cli.nome:'—')}</div><div class="fsub">${escH(v?v.produto:'')} · Parcela ${p.numero} de ${totalParc} · ${p.pagamento}</div></div><div style="display:flex;align-items:center;gap:10px"><div style="text-align:right"><div class="fval">${fmt(p.valor)}</div>${finTab==='atraso'?`<span class="pill-red">${dias}d</span>`:''}</div><div class="chk">›</div></div></div></div>`;
    });
    rows+='</div>';
  });
  const empty=`<div class="card"><div class="empty"><div class="empty-ic">${finTab==='atraso'?'&#x1F389;':'&#x2705;'}</div><div class="empty-tx">${finTab==='atraso'?'Sem atrasos!':'Nada a vencer!'}</div></div></div>`;

  p.pago=novoPago;
  p.datapagamento=novaData;
  pendingChanges[pid]={pago:novoPago,datapagamento:novaData};

}

async function salvarParcelas(){
  const ids=Object.keys(pendingChanges);

function modRolarJuros(vendaId){

  var proxParc=parcsAbertas[0];
  // Calcular nova data: mesmo dia do mes seguinte

  var novaData=new Date(dtAtual);

    '<div class="moverlay" id="moRJ" onclick="if(event.target===this)closeModal(\'moRJ\')">'+
    '<div class="modal">'+
    '<button class="mclose" onclick="closeModal(\'moRJ\')">&#x2715;</button>'+
    '<div class="mtit">&#x1F501; Rolar Juros</div>'+
    '<div style="background:var(--light);border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px">'+
    '<div style="font-weight:700;margin-bottom:6px">'+(cli?cli.nome:'')+' — Venda #'+v.numero+'</div>'+
    '<div style="color:var(--gray)">Parcela em aberto: <b style="color:var(--red)">'+fmt(proxParc.valor)+'</b> — vence '+fmtDate(proxParc.vencimento)+'</div>'+
    '<div style="color:var(--gray);margin-top:4px">&#x1F4C5; Novo vencimento: <b>'+fmtDate(novaDataStr)+'</b></div>'+
    '</div>'+
    '<div class="fg"><label class="flabel">Valor dos juros pagos hoje (R$)</label>'+
    '<input class="finput" id="rjValor" type="number" min="0" step="0.01" placeholder="Ex: 100,00" style="font-size:18px;text-align:center"></div>'+
    '<div class="fg"><label class="flabel">Forma de pagamento</label>'+
    '<select class="finput" id="rjForma"><option>Pix</option><option>Dinheiro</option><option>Cartao</option><option>Boleto</option><option>Fiado</option></select></div>'+
    '<div style="background:#FFF3EB;border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--org)">'+
    '&#x2139;&#xFE0F; Ser&#xe3;o criados: <b>1 pagamento de juros (pago hoje)</b> + vencimento dos <b>'+fmt(proxParc.valor)+'</b> empurrado para <b>'+fmtDate(novaDataStr)+'</b></div>'+
    '<button class="btn btn-pri" id="btnRJ" onclick="salvarRolarJuros(\''+vendaId+'\',\''+proxParc.id+'\',\''+novaDataStr+'\')">Confirmar</button>'+
    '</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  setTimeout(function(){var inp=document.getElementById('rjValor');if(inp)inp.focus();},100);
}

async function salvarRolarJuros(vendaId,parcId,novaData){
  var btn=document.getElementById('btnRJ');if(btn)btn.disabled=true;
  var valorJuros=parseFloat(document.getElementById('rjValor')&&document.getElementById('rjValor').value);
  var forma=document.getElementById('rjForma')&&document.getElementById('rjForma').value;
  if(!valorJuros||valorJuros<=0){alert('Informe o valor dos juros');if(btn)btn.disabled=false;return;}
  // 1. Criar parcela de juros (paga hoje)
  var vp=parcelas.filter(function(p){return p.vendaid===vendaId;});
  var novoNum=Math.max.apply(null,vp.map(function(p){return p.numero;}))+1;
  await addParcela({id:genId(),vendaid:vendaId,numero:novoNum,vencimento:todayStr(),pagamento:forma||'Pix',valor:valorJuros,pago:true,datapagamento:nowStr()});
  // 2. Empurrar vencimento da parcela principal para mes seguinte
  await updParcela(parcId,{vencimento:novaData});
  closeModal('moRJ');
  updBadge();
  renderScreen();
  toast('Juros registrados! Vencimento empurrado para '+fmtDate(novaData));
}

async function salvarNovaParcela(vendaId){
  const data=el('apData')?.value;const valor=parseFloat(el('apValor')?.value);const forma=el('apForma')?.value;
  if(!data||!valor){alert('Preencha todos os campos');return;}
  const vp=parcelas.filter(p=>p.vendaid===vendaId);
  const novaNum=Math.max(...vp.map(p=>p.numero),0)+1;
  await addParcela({id:genId(),vendaid:vendaId,numero:novaNum,vencimento:data,pagamento:forma,valor,pago:false,datapagamento:null});
  closeModal('moAP');renderScreen();toast('Parcela adicionada!');

function modReceberOutro(vendaId){
  const venda=vendas.find(v=>v.id===vendaId);
  const cli=clientes.find(c=>c.id===venda?.clienteid);
  const debit=parcelas.filter(p=>p.vendaid===vendaId&&!p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const proxParc=parcelas.filter(p=>p.vendaid===vendaId&&!p.pago).sort((a,b)=>a.vencimento.localeCompare(b.vencimento))[0];

async function salvarReceberOutro(vendaId,proxParcId){
  const btn=el('btnSalvRO');if(btn)btn.disabled=true;
  const valorPago=parseFloat(el('roValor')?.value);
  const dataRestante=el('roData')?.value;
  if(!valorPago||valorPago<=0){alert('Informe o valor pago');if(btn)btn.disabled=false;return;}
  const venda=vendas.find(v=>v.id===vendaId);
  const debit=parcelas.filter(p=>p.vendaid===vendaId&&!p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const restante=parseFloat((debit-valorPago).toFixed(2));
  // Marcar a proxima parcela como paga com valor parcial
  if(proxParcId){
    const pp=parcelas.find(p=>p.id===proxParcId);
    if(pp){
      await updParcela(proxParcId,{valor:valorPago,pago:true,datapagamento:nowStr()});
      // Se tem restante, criar nova parcela
      if(restante>0){
        const vp=parcelas.filter(p=>p.vendaid===vendaId);
        const novaNum=Math.max(...vp.map(p=>p.numero),0)+1;
        await addParcela({id:genId(),vendaid:vendaId,numero:novaNum,vencimento:dataRestante||addMonths(todayStr(),1),pagamento:pp.pagamento,valor:restante,pago:false,datapagamento:null});
      }
    }
  } else {
    // Sem parcela existente, criar duas: uma paga e uma em aberto
    const vp=parcelas.filter(p=>p.vendaid===vendaId);
    const n=Math.max(...vp.map(p=>p.numero),0);
    await addParcela({id:genId(),vendaid:vendaId,numero:n+1,vencimento:todayStr(),pagamento:'Pix',valor:valorPago,pago:true,datapagamento:nowStr()});
    if(restante>0)await addParcela({id:genId(),vendaid:vendaId,numero:n+2,vencimento:dataRestante||addMonths(todayStr(),1),pagamento:'Pix',valor:restante,pago:false,datapagamento:null});
  }
  closeModal('moRO');renderScreen();toast('Pagamento parcial registrado!');
  updBadge();
}

function compartilhar(vid){
  const v=vendas.find(x=>x.id===vid);if(!v)return;
  const cli=clientes.find(c=>c.id===v.clienteid);
  const vp=parcelas.filter(p=>p.vendaid===vid).sort((a,b)=>a.numero-b.numero);
  const pago=vp.filter(p=>p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const debit=vp.filter(p=>!p.pago).reduce((s,p)=>s+(p.valor||0),0);

  window.open(url,'_blank');
}

function compartilharReciboImg(vendaId){
  var v=vendas.find(function(x){return x.id===vendaId;});
  if(!v)return;
  var cli=clientes.find(function(x){return x.id===v.clienteid;});
  var vp=parcelas.filter(function(p){return p.vendaid===vendaId;}).sort(function(a,b){return a.numero-b.numero;});
  var debit=vp.filter(function(p){return !p.pago;}).reduce(function(s,p){return s+(p.valor||0);},0);

  // Gera imagem via Canvas 2D (funciona em todos os iOS sem dependencias externas)
  var W=760, pad=40, lh=30;
  var rows=[];
  rows.push({t:'title', txt:'Recibo'});
  rows.push({t:'center', txt:'Venda #'+v.numero});
  rows.push({t:'div'});
  rows.push({t:'center', txt:new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR')});
  rows.push({t:'div'});
  rows.push({t:'label', txt:'Cliente'});
  rows.push({t:'text', txt:cli?cli.nome:'Nao informado'});
  rows.push({t:'div'});
  rows.push({t:'label', txt:'Pagamento'});
  vp.forEach(function(p){
    var pago=p.pago?' (pago)':'';
    rows.push({t:'parc', num:p.numero, pay:p.pagamento, date:fmtDate(p.vencimento), val:fmt(p.valor), riscado:p.pago});
    if(p.pago&&p.datapagamento)rows.push({t:'small', txt:'Data Pagamento: '+fmtDate(p.datapagamento.slice(0,10))+' '+p.datapagamento.slice(11,19)});
  });
  rows.push({t:'div'});
  if(debit>0){rows.push({t:'bold', txt:'Saldo devedor total: '+fmt(debit)});rows.push({t:'div'});}

  // Calcular altura
  var H=pad;
  rows.forEach(function(r){H+=r.t==='div'?16:r.t==='title'?44:r.t==='small'?22:lh;});
  H+=pad;

  var cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  var y=pad;
  rows.forEach(function(r){
    ctx.fillStyle='#000';
    if(r.t==='div'){
      ctx.setLineDash([6,6]);ctx.strokeStyle='#ccc';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad,y+8);ctx.lineTo(W-pad,y+8);ctx.stroke();
      ctx.setLineDash([]);y+=16;
    } else if(r.t==='title'){
      ctx.font='bold 36px Courier New';ctx.textAlign='center';
      ctx.fillText(r.txt,W/2,y+36);ctx.textAlign='left';y+=44;
    } else if(r.t==='center'){
      ctx.font='24px Courier New';ctx.textAlign='center';
      ctx.fillText(r.txt,W/2,y+24);ctx.textAlign='left';y+=lh;
    } else if(r.t==='label'){
      ctx.font='bold 22px Courier New';ctx.fillStyle='#888';
      ctx.fillText(r.txt,pad,y+22);y+=lh;
    } else if(r.t==='bold'){
      ctx.font='bold 24px Courier New';ctx.textAlign='right';
      ctx.fillText(r.txt,W-pad,y+24);ctx.textAlign='left';y+=lh;
    } else if(r.t==='small'){
      ctx.font='20px Courier New';ctx.fillStyle='#888';
      ctx.fillText(r.txt,pad+20,y+18);y+=22;
    } else if(r.t==='parc'){
      ctx.font='22px Courier New';
      ctx.fillStyle=r.riscado?'#aaa':'#000';
      var line=r.num+'  '+r.pay+'  '+r.date;
      ctx.fillText(line,pad,y+22);
      if(r.riscado){
        ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.setLineDash([]);
        var tw=ctx.measureText(r.val).width;
        var rx=W-pad-tw;
        ctx.beginPath();ctx.moveTo(rx,y+14);ctx.lineTo(W-pad,y+14);ctx.stroke();
      }
      ctx.textAlign='right';
      ctx.fillText(r.val,W-pad,y+22);
      ctx.textAlign='left';ctx.fillStyle='#000';
      y+=lh;
    } else {
      ctx.font='24px Courier New';
      ctx.fillText(r.txt,pad,y+22);y+=lh;
    }
  });

  cv.toBlob(function(blob){
    var nome=(cli?cli.nome:'').replace(/\s+/g,'_');
    var fname=v.numero+'_'+nome+'_.jpeg';
    var file=new File([blob],fname,{type:'image/jpeg'});
    var url=URL.createObjectURL(blob);
    // Tentar Web Share API com arquivo
    if(navigator.share){
      var sd={title:'Recibo #'+v.numero};
      if(navigator.canShare&&navigator.canShare({files:[file]}))sd.files=[file];
      else sd.url=url;
      navigator.share(sd).then(function(){
        closeModal('moRecibo');nav('financeiro');
      }).catch(function(err){
        if(err.name!=='AbortError'){
          // Fallback: abrir imagem em nova aba (iPhone mostra botao compartilhar nativo)
          window.open(url,'_blank');
        }
        URL.revokeObjectURL(url);
      });
    } else {
      // Desktop: baixar arquivo
      var a=document.createElement('a');a.href=url;a.download=fname;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},3000);
      toast('Imagem salva!');
      setTimeout(function(){closeModal('moRecibo');nav('financeiro');},1500);
    }
  },'image/jpeg',0.95);
}

async function saveEP(id){const n=el('epNome')?.value?.trim();if(!n){alert('Informe o nome');return;}await updProduto(id,{nome:n,preco:parseFloat(el('epPreco')?.value)||0,custo:parseFloat(el('epCusto')?.value)||0});closeModal('moEP');renderScreen();toast('Atualizado!');}

// ── WIZARD ──────────────────────────────────────────────
function startWiz(){wiz={step:1,cliente:null,produto:null,preco:'',qtd:1,forma:'Pix',nParc:1,dataInicio:todayStr(),prazo:'mensal',editandoId:null};nav('nova-venda');}
function getWV(){const p=el('wPreco'),q=el('wQtd'),n=el('wParc');if(p)wiz.preco=p.value;if(q)wiz.qtd=Math.max(1,parseInt(q.value)||1);if(n)wiz.nParc=Math.max(1,parseInt(n.value)||1);}
function renderWiz(){const dots=[1,2,3].map(s=>`<div class="step-dot" style="width:${s===wiz.step?32:8}px;background:${s===wiz.step?'var(--org)':s<wiz.step?'var(--grn)':'var(--bdr)'}"></div>`).join('');return `<div class="steps">${dots}</div>${wiz.step===1?renderW1():wiz.step===2?renderW2():renderW3()}`;}
function renderW1(){
  const FORMAS=['Pix','Dinheiro','Cartao','Boleto','Fiado'];
  const PRAZOS=[{k:'mensal',l:'Mensal'},{k:'quinzenal',l:'Quinzenal'},{k:'semanal',l:'Semanal'},{k:'30dias',l:'30 em 30'}];
  const fC=FORMAS.map(f=>`<button class="chip ${wiz.forma===f?'on':''}" onclick="getWV();wiz.forma='${f}';renderScreen()">${f}</button>`).join('');
  const pC=PRAZOS.map(p=>`<button class="chip ${wiz.prazo===p.k?'on':''}" onclick="getWV();wiz.prazo='${p.k}';renderScreen()">${p.l}</button>`).join('');
  return `<div class="card"><div style="font-size:17px;font-weight:700;margin-bottom:18px">&#x1F464; Cliente e Produto</div><div class="fg"><label class="flabel">Cliente</label><button class="finput" style="text-align:left;cursor:pointer;display:block;width:100%" onclick="modCliWiz()">${wiz.cliente?escH(wiz.cliente.nome):'Selecionar cliente...'}</button></div><div class="fg"><label class="flabel">Produto / Serviço</label><button class="finput" style="text-align:left;cursor:pointer;display:block;width:100%" onclick="modProdWiz()">${wiz.produto?escH(wiz.produto.nome):'Selecionar produto...'}</button></div>${wiz.produto?`<div style="display:flex;gap:10px"><div class="fg" style="flex:2"><label class="flabel">Valor (R$)</label><input class="finput" id="wPreco" type="number" value="${wiz.preco}" placeholder="0.00" min="0" step="0.01"></div><div class="fg" style="flex:1"><label class="flabel">Qtd</label><input class="finput" id="wQtd" type="number" value="${wiz.qtd}" min="1" step="1"></div></div><div class="fg"><label class="flabel">Pagamento</label><div class="chips">${fC}</div></div><div style="display:flex;gap:10px"><div class="fg" style="flex:1"><label class="flabel">Parcelas</label><input class="finput" id="wParc" type="number" value="${wiz.nParc}" min="1" step="1"></div><div class="fg" style="flex:1"><label class="flabel">1ª Parcela</label><input class="finput" type="date" value="${wiz.dataInicio}" onchange="wiz.dataInicio=this.value"></div></div><div class="fg"><label class="flabel">Prazo</label><div class="chips">${pC}</div></div>`:''}<button class="btn btn-pri" onclick="avancarW1()">Ver Calendário &#x2192;</button></div>`;
}
function avancarW1(){getWV();const t=(parseFloat(wiz.preco)||0)*wiz.qtd;if(!wiz.produto){toast('Selecione um produto');return;}if(t<=0){toast('Informe o valor');return;}wiz.step=2;renderScreen();}
function calcVenc(){const ds=[];for(let i=0;i<wiz.nParc;i++){let d;if(wiz.prazo==='mensal')d=addMonths(wiz.dataInicio,i);else if(wiz.prazo==='semanal')d=addDays(wiz.dataInicio,i*7);else if(wiz.prazo==='quinzenal')d=addDays(wiz.dataInicio,i*15);else d=addDays(wiz.dataInicio,i*30);ds.push(d);}return ds;}
function renderW2(){const t=(parseFloat(wiz.preco)||0)*wiz.qtd;const vP=parseFloat((t/wiz.nParc).toFixed(2));const rows=calcVenc().map((d,i)=>`<div class="prow"><div class="pnum">${i+1}</div><div class="pinfo"><div class="pdate">${fmtDate(d)}</div><div class="ppay">${wiz.forma}</div></div><div class="pval">${fmt(vP)}</div></div>`).join('');return `<div class="card"><div style="font-size:17px;font-weight:700;margin-bottom:18px">&#x1F4C5; Calendário</div><div style="max-height:340px;overflow-y:auto;margin-bottom:14px">${rows}</div><div class="btn-row"><button class="btn btn-sec" onclick="wiz.step=1;renderScreen()">&#x2190; Voltar</button><button class="btn btn-pri" style="flex:2" onclick="wiz.step=3;renderScreen()">Confirmar &#x2192;</button></div></div>`;}
function renderW3(){const t=(parseFloat(wiz.preco)||0)*wiz.qtd;const vP=parseFloat((t/wiz.nParc).toFixed(2));const PL={mensal:'Mensal',quinzenal:'Quinzenal',semanal:'Semanal','30dias':'30 em 30'};return `<div class="card"><div style="font-size:17px;font-weight:700;margin-bottom:18px">&#x2705; Confirmar</div><div style="background:var(--light);border-radius:11px;padding:14px;margin-bottom:14px"><div class="prev-row"><span class="prev-label">Cliente</span><span class="prev-val">${wiz.cliente?escH(wiz.cliente.nome):'Nao informado'}</span></div><div class="prev-row"><span class="prev-label">Produto</span><span class="prev-val">${escH(wiz.produto?.nome||'')}</span></div><div class="prev-row"><span class="prev-label">Total</span><span class="prev-val" style="color:var(--org);font-size:18px">${fmt(t)}</span></div><div class="prev-row"><span class="prev-label">Parcelas</span><span class="prev-val">${wiz.nParc}x ${fmt(vP)}</span></div><div class="prev-row"><span class="prev-label">Pagamento</span><span class="prev-val">${wiz.forma} · ${PL[wiz.prazo]}</span></div></div><div class="btn-row"><button class="btn btn-sec" onclick="wiz.step=2;renderScreen()">&#x2190; Voltar</button><button class="btn btn-ok" style="flex:2" id="btnFin" onclick="finWiz()">&#x2713; Finalizar</button></div></div>`;}
async function finWiz(){
  const btn=el('btnFin');if(btn)btn.disabled=true;
  const t=(parseFloat(wiz.preco)||0)*wiz.qtd;
  const vP=parseFloat((t/wiz.nParc).toFixed(2));
  const num=(vendas.length?Math.max(...vendas.map(v=>v.numero)):3300)+1;
  const id=genId();
  await addVenda({id,numero:num,clienteid:wiz.cliente?.id||null,produto:wiz.produto.nome,preco:parseFloat(wiz.preco),qtd:wiz.qtd,total:t,custo:(wiz.produto?.custo||0)*wiz.qtd,data:todayStr()});
  const venc=calcVenc();
  for(let i=0;i<venc.length;i++)await addParcela({id:genId(),vendaid:id,numero:i+1,vencimento:venc[i],pagamento:wiz.forma,valor:vP,pago:false,datapagamento:null});
  param=id;nav('venda-detail',id);toast('Venda criada!');
}
function selCliWiz(id){var c=clientes.find(function(x){return x.id===id;});if(c){wiz.cliente={id:c.id,nome:c.nome};closeModal('moCW');renderScreen();}}
function modCliWiz(){
  var opts='';
  clientes.forEach(function(c){
    var tel=c.telefone?'<br><small style="color:var(--gray)">'+fmtPhone(c.telefone)+'</small>':'';
    opts+='<div class="litem cp" onclick="selCliWiz(\''+c.id+'\')">'+escH(c.nome)+tel+'</div>';
  });
  var empty='<div style="padding:16px;text-align:center;color:var(--gray)">Nenhum cliente</div>';
  document.body.insertAdjacentHTML('beforeend',
    '<div class="moverlay" id="moCW" onclick="if(event.target===this)closeModal(\'moCW\')">'+
    '<div class="modal">'+
    '<button class="mclose" onclick="closeModal(\'moCW\')">&#x2715;</button>'+
    '<div class="mtit">Selecionar Cliente</div>'+
    '<input class="finput" placeholder="Buscar..." oninput="srch(this,\'cWl\')" style="margin-bottom:10px">'+
    '<div class="lwrap" id="cWl">'+(opts||empty)+'</div>'+
    '<button class="btn btn-pri" style="margin-top:10px" onclick="closeModal(\'moCW\');modNCliWiz()">+ Cadastrar Novo</button>'+
    '</div></div>'
  );
}
function modNCliWiz(){document.body.insertAdjacentHTML('beforeend',`<div class="moverlay" id="moCWN" onclick="if(event.target===this)closeModal('moCWN')"><div class="modal"><button class="mclose" onclick="closeModal('moCWN')">&#x2715;</button><div class="mtit">Novo Cliente</div><div class="fg"><label class="flabel">Nome *</label><input class="finput" id="wcNome"></div><div class="fg"><label class="flabel">WhatsApp</label><input class="finput" id="wcTel" type="tel" placeholder="+55 19 99999-9999" oninput="this.value=fmtPhone(this.value)"></div><button class="btn btn-pri" onclick="savWCli()">Salvar</button></div></div>`);}
async function savWCli(){const n=el('wcNome')?.value?.trim();if(!n){alert('Informe o nome');return;}const c=await addCliente({nome:n,telefone:savePhone(el('wcTel')?.value||'')});wiz.cliente=c;closeModal('moCWN');renderScreen();}
function selProdWiz(id){var p=produtos.find(function(x){return x.id===id;});if(p){wiz.produto={id:p.id,nome:p.nome,custo:p.custo||0};wiz.preco=String(p.preco);closeModal('moPW');renderScreen();}}
function modProdWiz(){
  var opts='';
  produtos.forEach(function(p){
    opts+='<div class="litem cp" style="display:flex;justify-content:space-between" onclick="selProdWiz(\''+p.id+'\')">'+
          '<span>'+escH(p.nome)+'</span>'+
          '<span style="color:var(--org);font-weight:700">'+fmt(p.preco)+'</span></div>';
  });
  var empty='<div style="padding:16px;text-align:center;color:var(--gray)">Nenhum produto</div>';
  document.body.insertAdjacentHTML('beforeend',
    '<div class="moverlay" id="moPW" onclick="if(event.target===this)closeModal(\'moPW\')">'+
    '<div class="modal">'+
    '<button class="mclose" onclick="closeModal(\'moPW\')">&#x2715;</button>'+
    '<div class="mtit">Selecionar Produto</div>'+
    '<input class="finput" placeholder="Buscar..." oninput="srch(this,\'pWl\')" style="margin-bottom:10px">'+
    '<div class="lwrap" id="pWl">'+(opts||empty)+'</div>'+
    '<button class="btn btn-pri" style="margin-top:10px" onclick="closeModal(\'moPW\');modNProdWiz()">+ Cadastrar Novo</button>'+
    '</div></div>'
  );
}
function modNProdWiz(){document.body.insertAdjacentHTML('beforeend',`<div class="moverlay" id="moPWN" onclick="if(event.target===this)closeModal('moPWN')"><div class="modal"><button class="mclose" onclick="closeModal('moPWN')">&#x2715;</button><div class="mtit">Novo Produto</div><div class="fg"><label class="flabel">Nome *</label><input class="finput" id="wpNome"></div><div style="display:flex;gap:10px"><div class="fg" style="flex:1"><label class="flabel">Custo</label><input class="finput" id="wpCusto" type="number" min="0"></div><div class="fg" style="flex:1"><label class="flabel">Venda</label><input class="finput" id="wpPreco" type="number" min="0"></div></div><button class="btn btn-pri" onclick="savWProd()">Salvar</button></div></div>`);}
async function savWProd(){const n=el('wpNome')?.value?.trim();if(!n){alert('Informe o nome');return;}const p=await addProduto({nome:n,preco:parseFloat(el('wpPreco')?.value)||0,custo:parseFloat(el('wpCusto')?.value)||0});wiz.produto={id:p.id,nome:p.nome,custo:p.custo||0};wiz.preco=p.preco.toString();closeModal('moPWN');renderScreen();}

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load',async()=>{
  await garantirAdmin();
  var sessao=carregarSessao();
  if(sessao&&isTrialValido(sessao)){
    await iniciarApp();
  } else {
    limparSessao();
    el('loading').style.display='none';
    renderLoginScreen();
  }
});
</script>
