<script>
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);
const fmt = v => 'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const nowStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;};
const fmtDate = d => { if(!d) return ''; const p=d.slice(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };
const fmtDateTime = d => { if(!d) return ''; return fmtDate(d)+' '+d.slice(11,16); };
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const addMonths = (d,n) => {
  const [y,m,day]=d.split('-').map(Number);
  let nm=m+n, ny=y+Math.floor((nm-1)/12);
  nm=((nm-1)%12)+1;
  const maxDay=new Date(ny,nm,0).getDate();
  return `${ny}-${String(nm).padStart(2,'0')}-${String(Math.min(day,maxDay)).padStart(2,'0')}`;
};
const addDays=(d,n)=>{const [y,m,day]=d.split('-').map(Number);const dt=new Date(y,m-1,day+n);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const el = id => document.getElementById(id);
const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const toast = msg => { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); };
const fmtPhone = raw => { const d=raw.replace(/\D/g,'').replace(/^55/,''); if(d.length===11) return '+55 '+d.slice(0,2)+' '+d.slice(2,7)+'-'+d.slice(7); if(d.length===10) return '+55 '+d.slice(0,2)+' '+d.slice(2,6)+'-'+d.slice(6); return raw; };
const savePhone = raw => { const d=raw.replace(/\D/g,''); if(d.startsWith('55')&&d.length>=12) return '+'+d; if(d.length>=10) return '+55'+d; return raw; };
function fmtWhats(inp){
  var d=inp.value.replace(/\D/g,'').slice(0,11);
  if(!d){inp.value='';return;}
  var s=d;
  if(d.length>7)s='('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  else if(d.length>2)s='('+d.slice(0,2)+') '+d.slice(2);
  inp.value=s;
}

let clientes=[], produtos=[], vendas=[], parcelas=[];

var currentUser = null;
var LOGIN_TAB = 'login';

function hashSenha(s){
  // Hash simples para nao salvar senha em texto puro
  var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return 'h'+Math.abs(h).toString(36);
}
function salvarSessao(u,manter){
  currentUser=u;
  try{
    var dados={id:u.id,nome:u.nome,email:u.email,admin:u.admin,trial_ate:u.trial_ate,pix_cobranca:u.pix_cobranca||'',msg_hoje:u.msg_hoje||'',msg_amanha:u.msg_amanha||'',whatsapp:u.whatsapp||'',empresa_nome:u.empresa_nome||'',empresa_tel:u.empresa_tel||'',ts:Date.now(),manter:manter};
    localStorage.setItem('jc_user',JSON.stringify(dados));
  }catch(e){}
}
function limparSessao(){
  currentUser=null;
  try{localStorage.removeItem('jc_user');}catch(e){}
}
function carregarSessao(){
  try{
    var s=localStorage.getItem('jc_user');
    if(s){
      var d=JSON.parse(s);
      var ok=d.manter||(d.ts&&(Date.now()-d.ts)<86400000*7);
      if(ok){currentUser=d;}
      else{localStorage.removeItem('jc_user');}
    }
  }catch(e){}
  return currentUser;
}
function isTrialValido(u){
  if(u.admin)return true;
  if(!u.trial_ate)return false;
  return new Date(u.trial_ate)>=new Date();
}

async function fazerLogin(){
  var btn=document.getElementById('btnLogin');if(btn)btn.disabled=true;
  var email=(document.getElementById('lgEmail')?.value||'').trim().toLowerCase();
  var senha=document.getElementById('lgSenha')?.value||'';
  if(!email||!senha){alert('Preencha email e senha');if(btn)btn.disabled=false;return;}
  var hash=hashSenha(senha);
  var res=await supa.from('usuarios').select('*').eq('email',email).eq('senha',hash).single();
  if(res.error||!res.data){
    alert('Email ou senha incorretos');if(btn)btn.disabled=false;return;
  }
  var u=res.data;
  if(!u.ativo){alert('Conta desativada. Entre em contato.');if(btn)btn.disabled=false;return;}
  if(!isTrialValido(u)){alert('Seu período gratuito expirou. Entre em contato para renovar.');if(btn)btn.disabled=false;return;}
  var manter=document.getElementById('mantConec')&&document.getElementById('mantConec').checked;
  salvarSessao(u,manter);
  await iniciarApp();
}

async function fazerCadastro(){
  var btn=document.getElementById('btnLogin');if(btn)btn.disabled=true;
  var nome=(document.getElementById('lgNome')?.value||'').trim();
  var email=(document.getElementById('lgEmail')?.value||'').trim().toLowerCase();
  var senha=document.getElementById('lgSenha')?.value||'';
  if(!nome||!email||!senha){alert('Preencha todos os campos');if(btn)btn.disabled=false;return;}
  if(senha.length<6){alert('Senha deve ter pelo menos 6 caracteres');if(btn)btn.disabled=false;return;}
  // Verificar se email já existe
  var chk=await supa.from('usuarios').select('id').eq('email',email);
  if(chk.data&&chk.data.length>0){alert('Este email já está cadastrado');if(btn)btn.disabled=false;return;}
  var trial=new Date();trial.setDate(trial.getDate()+30);
  var novoUser={id:genId(),email:email,nome:nome,whatsapp:whatsapp,senha:hashSenha(senha),admin:false,trial_ate:`${trial.getFullYear()}-${String(trial.getMonth()+1).padStart(2,'0')}-${String(trial.getDate()).padStart(2,'0')}`,ativo:true};
  var ins=await supa.from('usuarios').insert(novoUser);
  if(ins.error){alert('Erro ao cadastrar: '+ins.error.message);if(btn)btn.disabled=false;return;}
  salvarSessao(novoUser);
  // Criar dados iniciais para o novo usuário
  currentUser=novoUser;
  await addCliente({nome:'Exemplo Cliente',telefone:''});
  await iniciarApp();
}

function gerarPix(chave,nome,cidade,valor){
  function emv(id,v){var s=String(v);return id+('0'+s.length).slice(-2)+s;}
  function crc16(str){
    var c=0xFFFF;
    for(var i=0;i<str.length;i++){c^=str.charCodeAt(i)<<8;for(var j=0;j<8;j++){c=(c&0x8000)?((c<<1)^0x1021):(c<<1);c&=0xFFFF;}}
    return c.toString(16).toUpperCase().padStart(4,'0');
  }
  var mai=emv('00','BR.GOV.BCB.PIX')+emv('01',chave);
  var p=emv('00','01')+emv('26',mai)+emv('52','0000')+emv('53','986')+
        emv('54',parseFloat(valor).toFixed(2))+
        emv('58','BR')+emv('59',nome.slice(0,25))+emv('60',cidade.slice(0,15))+
        emv('62',emv('05','AgiVendas'))+'6304';
  return p+crc16(p);
}

  const [rc,rp,rv]=await Promise.all([

    supa.from('produtos').select('*').eq('user_id',uid),
    supa.from('vendas').select('*').eq('user_id',uid).order('numero',{ascending:false})
  ]);
  clientes=rc.data||[]; produtos=rp.data||[]; vendas=rv.data||[];
  // Carregar parcelas apenas das vendas deste usuário
  var vids=vendas.map(function(v){return v.id;});
  if(vids.length>0){
    // Carregar em lotes para evitar limite de 1000 linhas do Supabase
    var allParc=[];
    var batchSize=100; // lotes de venda IDs
    for(var bi=0;bi<vids.length;bi+=batchSize){
      var batch=vids.slice(bi,bi+batchSize);
      var from=0,pageSize=1000;
      while(true){
        var rpa=await supa.from('parcelas').select('*').in('vendaid',batch).range(from,from+pageSize-1);
        allParc=allParc.concat(rpa.data||[]);
        if(!rpa.data||rpa.data.length<pageSize)break;
        from+=pageSize;
      }
    }
    parcelas=allParc;
  } else {
    parcelas=[];
  }
  var rmp=await supa.from('msgs_produtos').select('*').eq('user_id',uid);
  msgsProdutos=rmp.data||[];
}

function modEditarDataParcela(pid){
  var p=parcelas.find(function(x){return x.id===pid;});if(!p)return;
  var vp=parcelas.filter(function(x){return x.vendaid===p.vendaid;}).sort(function(a,b){return a.numero-b.numero;});
  var proximas=vp.filter(function(x){return x.numero>p.numero&&!x.pago;});
  document.body.insertAdjacentHTML('beforeend',
    '<div class="moverlay" id="moED" onclick="if(event.target===this)closeModal(\'moED\')">'+
    '<div class="modal"><button class="mclose" onclick="closeModal(\'moED\')">&#x2715;</button>'+
    '<div class="mtit">Alterar Vencimento</div>'+
    '<div style="background:var(--light);border-radius:12px;padding:12px;margin-bottom:14px;font-size:13px">'+
    'Parcela '+p.numero+' - Atual: <b>'+fmtDate(p.vencimento)+'</b></div>'+
    '<div class="fg"><label class="flabel">Nova data</label><input class="finput" id="edData" type="date" value="'+p.vencimento+'"></div>'+
    '<div class="fg"><label class="flabel">Novo valor (R$) <span style="color:var(--gray);font-weight:400;font-size:11px">— opcional, para adicionar juros</span></label>'+
    '<input class="finput" id="edValor" type="number" min="0" step="0.01" placeholder="'+p.valor+'" value="'+p.valor+'"></div>'+
    (proximas.length?'<div style="background:#FFF3EB;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px">'+
    '&#x2139;&#xFE0F; Ha <b>'+proximas.length+'</b> parcelas futuras. Deseja atualizar a data de todas pela mesma diferenca?</div>'+
    '<div class="btn-row">'+
    '<button class="btn btn-sec" onclick="salvarDataParcela(\''+pid+'\',false)">Só esta</button>'+
    '<button class="btn btn-pri" onclick="salvarDataParcela(\''+pid+'\',true)">Esta + proximas</button>'+
    '</div>':
    '<button class="btn btn-pri" onclick="salvarDataParcela(\''+pid+'\',false)">Salvar</button>')+
    '</div></div>');
}
async function salvarDataParcela(pid,atualizarProximas){
  var p=parcelas.find(function(x){return x.id===pid;});if(!p)return;
  var novaData=el('edData')&&el('edData').value;if(!novaData){alert('Informe a data');return;}
  var novoValor=parseFloat(el('edValor')&&el('edValor').value)||p.valor;
  var diffMs=new Date(novaData)-new Date(p.vencimento);
  var diffDias=Math.round(diffMs/86400000);
  await updParcela(pid,{vencimento:novaData,valor:novoValor});
  if(atualizarProximas&&diffDias!==0){
    var proximas=parcelas.filter(function(x){return x.vendaid===p.vendaid&&x.numero>p.numero&&!x.pago;});
    for(var i=0;i<proximas.length;i++){
      var px=proximas[i];
      var dt=new Date(px.vencimento);dt.setDate(dt.getDate()+diffDias);
      var nd=dt.toISOString().slice(0,10);
      await updParcela(px.id,{vencimento:nd});
    }
  }
  closeModal('moED');renderScreen();
  toast(atualizarProximas&&diffDias?'Data e proximas atualizadas!':'Data atualizada!');
}


function relExportar(){
  var t=todayStr();var mes=t.slice(0,7);
  var tR=parcelas.filter(function(p){return p.pago&&p.datapagamento&&p.datapagamento.slice(0,7)===mes;}).reduce(function(s,p){return s+(p.valor||0);},0);
  var cu=vendas.filter(function(v){return v.data&&v.data.slice(0,7)===mes;}).reduce(function(s,v){return s+(v.custo||0);},0);
  var tA=parcelas.filter(function(p){return !p.pago&&p.vencimento<t;}).reduce(function(s,p){return s+(p.valor||0);},0);
  var txt='*DRE JuliusCredit*\n'+nomeMes(mes)+'\n\nRecebido: '+fmt(tR)+'\nCusto: '+fmt(cu)+'\nResultado: '+fmt(tR-cu)+'\n\nEm atraso: '+fmt(tA);
  window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(txt),'_blank');
}

  const pago=vp.filter(p=>p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const debit=vp.filter(p=>!p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const t=todayStr();
  let pRows='';
  vp.forEach(p=>{

function toggleParc(pid){
  const p=parcelas.find(x=>x.id===pid);if(!p)return;
  const novoPago=!p.pago;
  const novaData=novoPago?nowStr():null;
  p.pago=novoPago;
  p.datapagamento=novaData;
  pendingChanges[pid]={pago:novoPago,datapagamento:novaData};
  renderScreen();
}

async function salvarParcelas(){
  const ids=Object.keys(pendingChanges);
  if(ids.length===0){showReciboModal(param);return;}
  var novoPago=ids.filter(function(id){return pendingChanges[id]&&pendingChanges[id].pago===true;});
  for(var i=0;i<ids.length;i++){
    await updParcela(ids[i],pendingChanges[ids[i]]);
  }
  pendingChanges={};
  updBadge();
  if(novoPago.length>0){
    var pid=novoPago[0];
    var parc=(typeof parcelas!=='undefined'?parcelas:[]).find(function(x){return x.id==pid;});
    var vd=parc?((typeof vendas!=='undefined'?vendas:[]).find(function(x){return x.id==parc.vendaid;})):null;
    var cl=vd?((typeof clientes!=='undefined'?clientes:[]).find(function(x){return x.id==vd.clienteid;})):null;
    var vl=parc?parc.valor:0;
    var nm=cl?cl.nome:'';
    var el=document.createElement('div');
    el.id='modalAtivarGS';
    el.className='moverlay';
    el.innerHTML='<div class="modal" style="padding-bottom:30px"><div style="text-align:center;margin-bottom:18px"><div style="font-size:42px">&#x2705;</div><div class="mtit" style="margin-bottom:6px">Pagamento confirmado!</div>'+(nm?'<div style="font-size:14px;color:var(--gray)">R$ '+vl.toFixed(2)+' - '+nm+'</div>':'')+'</div><div style="background:var(--org-lt);border-radius:12px;padding:14px;margin-bottom:18px;text-align:center"><div style="font-size:14px;font-weight:600;color:var(--org)">Ativar no gestor.rs agora?</div><div style="font-size:12px;color:var(--gray);margin-top:4px">O acesso sera renovado automaticamente</div></div><div class="btn-row"><button class="btn btn-sec" id="btnNaoGS">Não agora</button><button class="btn btn-pri" id="btnSimGS">Sim, ativar</button></div></div>';
    document.body.appendChild(el);
    el.querySelector('#btnNaoGS').addEventListener('click',function(){
      el.remove();
      novoPago.forEach(function(id){updParcela(id,{iptv_ativado:true});});
      showReciboModal(param);
    });
    el.querySelector('#btnSimGS').addEventListener('click',function(){
      el.remove();
      novoPago.forEach(function(id){updParcela(id,{iptv_ativado:false});});
      showReciboModal(param);
    });
  } else {
    showReciboModal(param);
  }
}

    '</div>'+

    '<input class="finput" id="rjValor" type="number" min="0" step="0.01" placeholder="Ex: 100,00" style="font-size:18px;text-align:center"></div>'+
    '<div class="fg"><label class="flabel">Data do pagamento dos juros</label>'+
    '<input class="finput" id="rjDataPag" type="date" value="'+todayStr()+'">'+
    '<small style="color:var(--gray);font-size:11px;margin-top:4px;display:block">Se houve atraso, ajuste a data e o valor acima</small></div>'+
    '<div class="fg"><label class="flabel">Nova data de vencimento da parcela</label>'+

    '<select class="finput" id="rjForma"><option>Pix</option><option>Dinheiro</option><option>Cartao</option><option>Boleto</option><option>Fiado</option></select></div>'+

    '</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  setTimeout(function(){var inp=document.getElementById('rjValor');if(inp)inp.focus();},100);
}

async function salvarRolarJuros(vendaId,parcId){
  var btn=document.getElementById('btnRJ');if(btn)btn.disabled=true;
  var valorJuros=parseFloat(document.getElementById('rjValor')&&document.getElementById('rjValor').value);
  var dataPag=document.getElementById('rjDataPag')&&document.getElementById('rjDataPag').value||todayStr();
  var novaData=document.getElementById('rjDataVenc')&&document.getElementById('rjDataVenc').value;
  var forma=document.getElementById('rjForma')&&document.getElementById('rjForma').value;
  if(!valorJuros||valorJuros<=0){alert('Informe o valor dos juros');if(btn)btn.disabled=false;return;}
  if(!novaData){alert('Informe a nova data de vencimento');if(btn)btn.disabled=false;return;}
  var vp=parcelas.filter(function(p){return p.vendaid===vendaId;});
  var novoNum=Math.max.apply(null,vp.map(function(p){return p.numero;}))+1;
  await addParcela({id:genId(),vendaid:vendaId,numero:novoNum,vencimento:dataPag,pagamento:forma||'Pix',valor:valorJuros,pago:true,datapagamento:dataPag+'T12:00:00'});
  await updParcela(parcId,{vencimento:novaData});
  closeModal('moRJ');
  updBadge();
  renderScreen();
  toast('Juros registrados! Vencimento empurrado para '+fmtDate(novaData));
}

function modAdicionarParc(vendaId){
  document.body.insertAdjacentHTML('beforeend',`<div class="moverlay" id="moAP" onclick="if(event.target===this)closeModal('moAP')"><div class="modal"><button class="mclose" onclick="closeModal('moAP')">&#x2715;</button><div class="mtit">Adicionar Parcela</div><div class="fg"><label class="flabel">Vencimento</label><input class="finput" id="apData" type="date" value="${addMonths(todayStr(),1)}"></div><div class="fg"><label class="flabel">Valor (R$)</label><input class="finput" id="apValor" type="number" placeholder="0.00" min="0"></div><div class="fg"><label class="flabel">Pagamento</label><select class="finput" id="apForma"><option>Pix</option><option>Dinheiro</option><option>Cartao</option><option>Boleto</option><option>Fiado</option></select></div><button class="btn btn-pri" onclick="salvarNovaParcela('${vendaId}')">Adicionar</button></div></div>`);
}

async function salvarNovaParcela(vendaId){
  const data=el('apData')?.value;const valor=parseFloat(el('apValor')?.value);const forma=el('apForma')?.value;
  if(!data||!valor){alert('Preencha todos os campos');return;}
  const vp=parcelas.filter(p=>p.vendaid===vendaId);
  const novaNum=Math.max(...vp.map(p=>p.numero),0)+1;
  await addParcela({id:genId(),vendaid:vendaId,numero:novaNum,vencimento:data,pagamento:forma,valor,pago:false,datapagamento:null});
  closeModal('moAP');renderScreen();toast('Parcela adicionada!');
}

  const venda=vendas.find(v=>v.id===vendaId);
  const cli=clientes.find(c=>c.id===venda?.clienteid);
  const debit=parcelas.filter(p=>p.vendaid===vendaId&&!p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const proxParc=parcelas.filter(p=>p.vendaid===vendaId&&!p.pago).sort((a,b)=>a.vencimento.localeCompare(b.vencimento))[0];
  document.body.insertAdjacentHTML('beforeend',`<div class="moverlay" id="moRO" onclick="if(event.target===this)closeModal('moRO')"><div class="modal"><button class="mclose" onclick="closeModal('moRO')">&#x2715;</button><div class="mtit">Receber Outro Valor</div><div style="background:var(--light);border-radius:12px;padding:14px;margin-bottom:16px"><div style="font-size:13px;font-weight:700">${escH(cli?cli.nome:'')}</div><div style="font-size:12px;color:var(--gray);margin-top:4px">Total da venda: ${fmt(venda?.total)}</div><div style="font-size:12px;color:var(--red);font-weight:600">Em aberto: ${fmt(debit)}</div></div><p style="text-align:center;font-size:14px;font-weight:600;margin-bottom:12px">Qual o valor pago parcialmente?</p><div class="fg"><input class="finput" id="roValor" type="number" placeholder="R$ 0,00" min="0" style="font-size:18px;text-align:center"></div><div class="fg"><label class="flabel">Vencimento do restante</label><input class="finput" id="roData" type="date" value="${addMonths(todayStr(),1)}"></div><button class="btn btn-pri" id="btnSalvRO" onclick="salvarReceberOutro('${vendaId}','${proxParc?.id||''}')">Salvar</button></div></div>`);
}

async function salvarReceberOutro(vendaId,proxParcId){
  const btn=el('btnSalvRO');if(btn)btn.disabled=true;
  const valorPago=parseFloat(el('roValor')?.value);
  const dataRestante=el('roData')?.value;
  if(!valorPago||valorPago<=0){alert('Informe o valor pago');if(btn)btn.disabled=false;return;}
  const venda=vendas.find(v=>v.id===vendaId);
  const debit=parcelas.filter(p=>p.vendaid===vendaId&&!p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const restante=parseFloat((debit-valorPago).toFixed(2));
  // Marcar a proxima parcela como paga com valor parcial
  if(proxParcId){
    const pp=parcelas.find(p=>p.id===proxParcId);
    if(pp){
      await updParcela(proxParcId,{valor:valorPago,pago:true,datapagamento:nowStr()});
      // Se tem restante, criar nova parcela
      if(restante>0){
        const vp=parcelas.filter(p=>p.vendaid===vendaId);
        const novaNum=Math.max(...vp.map(p=>p.numero),0)+1;
        await addParcela({id:genId(),vendaid:vendaId,numero:novaNum,vencimento:dataRestante||addMonths(todayStr(),1),pagamento:pp.pagamento,valor:restante,pago:false,datapagamento:null});
      }
    }
  } else {
    // Sem parcela existente, criar duas: uma paga e uma em aberto
    const vp=parcelas.filter(p=>p.vendaid===vendaId);
    const n=Math.max(...vp.map(p=>p.numero),0);
    await addParcela({id:genId(),vendaid:vendaId,numero:n+1,vencimento:todayStr(),pagamento:'Pix',valor:valorPago,pago:true,datapagamento:nowStr()});
    if(restante>0)await addParcela({id:genId(),vendaid:vendaId,numero:n+2,vencimento:dataRestante||addMonths(todayStr(),1),pagamento:'Pix',valor:restante,pago:false,datapagamento:null});
  }
  closeModal('moRO');renderScreen();toast('Pagamento parcial registrado!');
  updBadge();
}

function gerarImagemRecibo(vid){
  var v=vendas.find(function(x){return x.id===vid;});
  if(!v||typeof html2canvas==='undefined'){compartilhar(vid);return;}
  var cli=clientes.find(function(c){return c.id===v.clienteid;});
  var vp=parcelas.filter(function(p){return p.vendaid===vid;}).sort(function(a,b){return a.numero-b.numero;});
  var debit=vp.filter(function(p){return !p.pago;}).reduce(function(s,p){return s+(p.valor||0);},0);
  var rc=document.getElementById('rcWrap');
  if(!rc){compartilhar(vid);return;}
  var sep='<div style="border-top:1px dashed #aaa;margin:8px 0"></div>';
  var pr='';
  vp.forEach(function(p){
    var st=p.pago?'text-decoration:line-through;color:#aaa':'';
    pr+='<div style="display:flex;justify-content:space-between;padding:1px 0">';
    pr+='<span>'+p.numero+' '+p.pagamento+'</span>';
    pr+='<span style="flex:1;text-align:center">'+fmtDate(p.vencimento)+'</span>';
    pr+='<span style="'+st+'">'+fmt(p.valor)+'</span></div>';
    if(p.pago&&p.datapagamento)
      pr+='<div style="font-size:10px;color:#888;text-align:right">Data Pagamento: '+fmtDate(p.datapagamento.slice(0,10))+' '+p.datapagamento.slice(11,19)+'</div>';
  });
  rc.innerHTML=
    '<div style="text-align:center;font-size:20px;font-weight:bold">Recibo</div>'+
    '<div style="text-align:center;color:#555;margin-bottom:4px">Venda #'+v.numero+'</div>'+sep+
    '<div style="text-align:center;color:#555">'+new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR')+'</div>'+sep+
    '<b>Cliente</b><div style="margin:2px 0 6px">'+(cli?cli.nome:'Nao informado')+'</div>'+sep+
    '<b>Pagamento</b><div style="margin:4px 0">'+pr+'</div>'+sep+
    (debit>0?'<div style="text-align:right"><b>Saldo devedor total: '+fmt(debit)+'</b></div>'+sep:'');
  rc.style.cssText='position:fixed;left:0;top:0;z-index:9999;width:380px;background:#fff;padding:24px;font-family:Courier New,monospace;font-size:12px;line-height:1.7;color:#000';
  setTimeout(function(){
    html2canvas(rc,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false}).then(function(canvas){
      rc.style.cssText='position:fixed;left:-9999px;top:-9999px;z-index:-1';
      canvas.toBlob(function(blob){
        var nome=(cli?cli.nome:'').replace(/\s+/g,'_');
        var fname=v.numero+'_'+nome+'_.jpeg';
        var file=new File([blob],fname,{type:'image/jpeg'});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:'Recibo'}).catch(function(){});
        } else {
          var url=URL.createObjectURL(blob);
          var a=document.createElement('a');a.href=url;a.download=fname;
          document.body.appendChild(a);a.click();document.body.removeChild(a);
          setTimeout(function(){URL.revokeObjectURL(url);},3000);
          toast('Imagem baixada! Envie pelo WhatsApp.');
        }
      },'image/jpeg',0.95);
    }).catch(function(){
      rc.style.cssText='position:fixed;left:-9999px;top:-9999px;z-index:-1';
      compartilhar(vid);
    });
  },100);
}

function compartilhar(vid){
  const v=vendas.find(x=>x.id===vid);if(!v)return;
  const cli=clientes.find(c=>c.id===v.clienteid);
  const vp=parcelas.filter(p=>p.vendaid===vid).sort((a,b)=>a.numero-b.numero);
  const pago=vp.filter(p=>p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const debit=vp.filter(p=>!p.pago).reduce((s,p)=>s+(p.valor||0),0);
  const txt='*Resumo - '+(cli?cli.nome:'')+' *\n'+v.produto+'\nVenda #'+v.numero+'\n\n'+vp.map(p=>p.numero+'. '+fmtDate(p.vencimento)+' - '+fmt(p.valor)+(p.pago?' ✅':'')).join('\n')+'\n\n*Total: '+fmt(v.total)+'*\n✅ Pago: '+fmt(pago)+'\n⏳ Em aberto: '+fmt(debit);
  const tel=cli?.telefone?cli.telefone.replace(/\D/g,''):'';
  const url=tel?'https://api.whatsapp.com/send?phone='+tel+'&text='+encodeURIComponent(txt):'https://api.whatsapp.com/send?text='+encodeURIComponent(txt);
  window.open(url,'_blank');
}

function compartilharReciboImg(vendaId){
  var v=vendas.find(function(x){return x.id===vendaId;});
  if(!v)return;
  var cli=clientes.find(function(x){return x.id===v.clienteid;});
  var vp=parcelas.filter(function(p){return p.vendaid===vendaId;}).sort(function(a,b){return a.numero-b.numero;});
  var debit=vp.filter(function(p){return !p.pago;}).reduce(function(s,p){return s+(p.valor||0);},0);

  // Gera imagem via Canvas 2D (funciona em todos os iOS sem dependencias externas)
  var W=760, pad=40, lh=30;
  var rows=[];
  rows.push({t:'title', txt:'Recibo'});
  rows.push({t:'center', txt:'Venda #'+v.numero});
  rows.push({t:'div'});
  rows.push({t:'center', txt:new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR')});
  rows.push({t:'div'});
  rows.push({t:'label', txt:'Cliente'});
  rows.push({t:'text', txt:cli?cli.nome:'Nao informado'});
  rows.push({t:'div'});
  rows.push({t:'label', txt:'Pagamento'});
  vp.forEach(function(p){
    var pago=p.pago?' (pago)':'';
    rows.push({t:'parc', num:p.numero, pay:p.pagamento, date:fmtDate(p.vencimento), val:fmt(p.valor), riscado:p.pago});
    if(p.pago&&p.datapagamento)rows.push({t:'small', txt:'Data Pagamento: '+fmtDate(p.datapagamento.slice(0,10))+' '+p.datapagamento.slice(11,19)});
  });
  rows.push({t:'div'});
  if(debit>0){rows.push({t:'bold', txt:'Saldo devedor total: '+fmt(debit)});rows.push({t:'div'});}

  // Calcular altura
  var H=pad;
  rows.forEach(function(r){H+=r.t==='div'?16:r.t==='title'?44:r.t==='small'?22:lh;});
  H+=pad;

  var cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  var y=pad;
  rows.forEach(function(r){
    ctx.fillStyle='#000';
    if(r.t==='div'){
      ctx.setLineDash([6,6]);ctx.strokeStyle='#ccc';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad,y+8);ctx.lineTo(W-pad,y+8);ctx.stroke();
      ctx.setLineDash([]);y+=16;
    } else if(r.t==='title'){
      ctx.font='bold 36px Courier New';ctx.textAlign='center';
      ctx.fillText(r.txt,W/2,y+36);ctx.textAlign='left';y+=44;
    } else if(r.t==='center'){
      ctx.font='24px Courier New';ctx.textAlign='center';
      ctx.fillText(r.txt,W/2,y+24);ctx.textAlign='left';y+=lh;
    } else if(r.t==='label'){
      ctx.font='bold 22px Courier New';ctx.fillStyle='#888';
      ctx.fillText(r.txt,pad,y+22);y+=lh;
    } else if(r.t==='bold'){
      ctx.font='bold 24px Courier New';ctx.textAlign='right';
      ctx.fillText(r.txt,W-pad,y+24);ctx.textAlign='left';y+=lh;
    } else if(r.t==='small'){
      ctx.font='20px Courier New';ctx.fillStyle='#888';
      ctx.fillText(r.txt,pad+20,y+18);y+=22;
    } else if(r.t==='parc'){
      ctx.font='22px Courier New';
      ctx.fillStyle=r.riscado?'#aaa':'#000';
      var line=r.num+'  '+r.pay+'  '+r.date;
      ctx.fillText(line,pad,y+22);
      if(r.riscado){
        ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.setLineDash([]);
        var tw=ctx.measureText(r.val).width;
        var rx=W-pad-tw;
        ctx.beginPath();ctx.moveTo(rx,y+14);ctx.lineTo(W-pad,y+14);ctx.stroke();
      }
      ctx.textAlign='right';
      ctx.fillText(r.val,W-pad,y+22);
      ctx.textAlign='left';ctx.fillStyle='#000';
      y+=lh;
    } else {
      ctx.font='24px Courier New';
      ctx.fillText(r.txt,pad,y+22);y+=lh;
    }
  });

  cv.toBlob(function(blob){
    var nome=(cli?cli.nome:'').replace(/\s+/g,'_');
    var fname=v.numero+'_'+nome+'_.jpeg';
    var file=new File([blob],fname,{type:'image/jpeg'});
    var url=URL.createObjectURL(blob);
    // Tentar Web Share API com arquivo
    if(navigator.share){
      var sd={title:'Recibo #'+v.numero};
      if(navigator.canShare&&navigator.canShare({files:[file]}))sd.files=[file];
      else sd.url=url;
      navigator.share(sd).then(function(){
        closeModal('moRecibo');nav('financeiro');
      }).catch(function(err){
        if(err.name!=='AbortError'){
          // Fallback: abrir imagem em nova aba (iPhone mostra botao compartilhar nativo)
          window.open(url,'_blank');
        }
        URL.revokeObjectURL(url);
      });
    } else {
      // Desktop: baixar arquivo
      var a=document.createElement('a');a.href=url;a.download=fname;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},3000);
      toast('Imagem salva!');
      setTimeout(function(){closeModal('moRecibo');nav('financeiro');},1500);
    }
  },'image/jpeg',0.95);
}

function srchF(inp,lid){
  const q=inp.value.toLowerCase();
  document.querySelectorAll('#'+lid+' .fitem').forEach(i=>i.style.display=i.textContent.toLowerCase().includes(q)?'':'none');
  // Esconder grupos de data que ficaram sem itens visíveis
  const container=document.getElementById(lid);
  if(!container)return;
  const children=Array.from(container.children);
  let i=0;
  while(i<children.length){
    const child=children[i];
    if(child.classList.contains('date-sep')){
      const group=children[i+1];
      if(group&&group.classList.contains('lwrap')){
        const hasVisible=Array.from(group.querySelectorAll('.fitem')).some(f=>f.style.display!=='none');
        child.style.display=hasVisible?'':'none';
        group.style.display=hasVisible?'':'none';
        i+=2;continue;
      }
    }
    i++;
  }
}

function startWiz(){wiz={step:1,cliente:null,produto:null,preco:'',qtd:1,forma:'Pix',nParc:1,dataInicio:todayStr(),prazo:'mensal',editandoId:null};nav('nova-venda');}
function getWV(){const p=el('wPreco'),q=el('wQtd'),n=el('wParc');if(p)wiz.preco=p.value;if(q)wiz.qtd=Math.max(1,parseInt(q.value)||1);if(n)wiz.nParc=Math.max(1,parseInt(n.value)||1);}
function renderWiz(){const dots=[1,2,3].map(s=>`<div class="step-dot" style="width:${s===wiz.step?32:8}px;background:${s===wiz.step?'var(--org)':s<wiz.step?'var(--grn)':'var(--bdr)'}"></div>`).join('');var tit=wiz.editandoId?'<div style="text-align:center;font-weight:700;color:var(--org);font-size:13px;margin-bottom:4px">&#x270E; Editando venda</div>':'';return tit+`<div class="steps">${dots}</div>${wiz.step===1?renderW1():wiz.step===2?renderW2():renderW3()}`;}
function renderW1(){
  const FORMAS=['Pix','Dinheiro','Cartao','Boleto','Fiado'];
  const PRAZOS=[{k:'mensal',l:'Mensal'},{k:'quinzenal',l:'Quinzenal'},{k:'semanal',l:'Semanal'},{k:'30dias',l:'30 em 30'}];
  const fC=FORMAS.map(f=>`<button class="chip ${wiz.forma===f?'on':''}" onclick="getWV();wiz.forma='${f}';renderScreen()">${f}</button>`).join('');
  const pC=PRAZOS.map(p=>`<button class="chip ${wiz.prazo===p.k?'on':''}" onclick="getWV();wiz.prazo='${p.k}';renderScreen()">${p.l}</button>`).join('');

async function salvarMsgProduto(prodId){
  var prod=produtos.find(function(p){return p.id===prodId;});if(!prod)return;
  var prodNome=prod.nome;
  var mhp=(el('pm_h_'+prodId)&&el('pm_h_'+prodId).value)||'';
  var map2=(el('pm_a_'+prodId)&&el('pm_a_'+prodId).value)||'';
  try{
    var ex=msgsProdutos.find(function(m){return m.produto_nome===prodNome;});
    if(ex){
      var ru=await supa.from('msgs_produtos').update({msg_hoje:mhp,msg_amanha:map2}).eq('id',ex.id);
      if(ru.error)throw ru.error;
      ex.msg_hoje=mhp;ex.msg_amanha=map2;
    } else {
      var nv={id:genId(),user_id:currentUser.id,produto_nome:prodNome,msg_hoje:mhp,msg_amanha:map2};
      var ri=await supa.from('msgs_produtos').insert(nv);
      if(ri.error)throw ri.error;
      msgsProdutos.push(nv);
    }
    toast('✅ Mensagem de "'+prodNome+'" salva!');
  } catch(e){
    console.error('Erro salvarMsgProduto:',e);
    toast('❌ Erro ao salvar: '+(e.message||JSON.stringify(e)));
  }
}

function buildMsg(tpl,nome,produto,valor,numParc,totParc,pix){
  return tpl.replace(/{nome}/g,nome).replace(/{produto}/g,produto).replace(/{valor}/g,valor).replace(/{parcela}/g,numParc+' de '+totParc).replace(/{pix}/g,pix||'(configure PIX em Configurações)');
}
function abrirDisparo(){
  var t=todayStr();
  var amanha=new Date();amanha.setDate(amanha.getDate()+1);
  var amanhaStr=`${amanha.getFullYear()}-${String(amanha.getMonth()+1).padStart(2,'0')}-${String(amanha.getDate()).padStart(2,'0')}`;
  var u=currentUser||{};
  var pix=u.pix_cobranca||'';
  var mh=u.msg_hoje||MSG_HOJE_DEF;
  var ma=u.msg_amanha||MSG_AMANHA_DEF;
  var hoje=parcelas.filter(function(p){return !p.pago&&p.vencimento===t;});
  var amh=parcelas.filter(function(p){return !p.pago&&p.vencimento===amanhaStr;});
  function buildItem(p,tipo){
    var v=vendas.find(function(x){return x.id===p.vendaid;});
    var cli=clientes.find(function(c){return c.id===(v&&v.clienteid);});
    var tp=parcelas.filter(function(x){return x.vendaid===p.vendaid;}).length;
    var tel=(cli&&cli.telefone)||'';
    var nome=cli?cli.nome:'—';
    var prod=v?v.produto:'';
    var val=fmt(p.valor);
    var mprod=msgsProdutos.find(function(m){return m.produto_nome===prod;});
    var tpl=tipo==='hoje'?(mprod&&mprod.msg_hoje?mprod.msg_hoje:mh):(mprod&&mprod.msg_amanha?mprod.msg_amanha:ma);
    var msg=buildMsg(tpl,nome,prod,val,p.numero,tp,pix);
    return {id:p.id,nome:nome,prod:prod,val:val,tel:tel,msg:msg,tipo:tipo};
  }
  var itens=hoje.map(function(p){return buildItem(p,'hoje');}).concat(amh.map(function(p){return buildItem(p,'amanha');}));
  if(!itens.length){toast('Nenhum vencimento hoje ou amanhã!');return;}
  var rows='';var lastTipo='';
  itens.forEach(function(it,i){
    if(it.tipo!==lastTipo){rows+='<div style="font-size:12px;font-weight:700;color:'+(it.tipo==='hoje'?'var(--red)':'var(--org)')+';padding:8px 0 4px">'+(it.tipo==='hoje'?'📅 Vence Hoje':'📅 Vence Amanhã')+'</div>';lastTipo=it.tipo;}
    rows+='<label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--light);border-radius:10px;margin-bottom:6px;cursor:pointer">'+
      '<input type="checkbox" class="disp-chk" data-i="'+i+'" checked style="width:18px;height:18px;accent-color:var(--org)">'+
      '<div style="flex:1"><div style="font-weight:700;font-size:13px">'+escH(it.nome)+'</div>'+
      '<div style="font-size:11px;color:var(--gray)">'+escH(it.prod)+' · '+it.val+(it.tel?'':' · <b style="color:var(--red)">sem telefone</b>')+'</div></div></label>';
  });
  window._disparoItens=itens;
  document.body.insertAdjacentHTML('beforeend',
    '<div class="moverlay" id="moDisp" onclick="if(event.target===this)closeModal(\'moDisp\')">'+
    '<div class="modal">'+
    '<button class="mclose" onclick="closeModal(\'moDisp\')">&#x2715;</button>'+
    '<div class="mtit">&#x1F4F2; Disparar Cobranças</div>'+
    (!pix?'<div style="background:#FEE2E2;border-radius:10px;padding:10px;font-size:12px;color:var(--red);margin-bottom:12px">⚠️ Configure o PIX em Configurações → Cobranças.</div>':'')+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<span style="font-size:13px;color:var(--gray)">'+itens.length+' cliente(s)</span>'+
    '<button onclick="toggleTodos()" style="background:none;border:none;color:var(--org);font-weight:700;cursor:pointer;font-size:13px">&#x2705; Selecionar todos</button></div>'+
    '<div style="max-height:300px;overflow-y:auto">'+rows+'</div>'+
    '<button class="btn btn-pri" style="margin-top:14px" onclick="iniciarFila()">&#x1F4AC; Enviar selecionados</button>'+
    '</div></div>');
}
function toggleTodos(){
  var chks=document.querySelectorAll('.disp-chk');
  var todos=Array.from(chks).every(function(c){return c.checked;});
  chks.forEach(function(c){c.checked=!todos;});
}
function iniciarFila(){
  var chks=document.querySelectorAll('.disp-chk');
  var sel=[];
  chks.forEach(function(c){if(c.checked)sel.push(window._disparoItens[parseInt(c.dataset.i)]);});
  if(!sel.length){toast('Selecione ao menos um cliente');return;}
  var comTel=sel.filter(function(x){return x.tel;});
  var semTel=sel.filter(function(x){return !x.tel;}).length;
  if(!comTel.length){toast('Nenhum cliente tem telefone cadastrado');return;}
  closeModal('moDisp');
  window._filaDisparo=comTel;
  window._filaIdx=0;
  window._semTel=semTel;
  abrirProximoWA();
}
function abrirProximoWA(){
  var fila=window._filaDisparo;
  var idx=window._filaIdx;
  var semTel=window._semTel||0;
  if(idx>=fila.length){
    var m=document.getElementById('moFila');if(m)m.remove();
    toast('\u2705 '+fila.length+' mensagens enviadas!');return;
  }
  var it=fila[idx];
  var total=fila.length;
  var tel=it.tel.replace(/\D/g,'');
  var waUrl='https://wa.me/'+tel+'?text='+encodeURIComponent(it.msg);
  var ultimo=idx+1>=total;
  var pct=Math.round((idx+1)/total*100);
  var html='<div class="moverlay" id="moFila"><div class="modal" style="text-align:center">'+
    '<div style="font-size:12px;color:var(--gray);margin-bottom:6px">'+(idx+1)+' de '+total+(semTel?' · '+semTel+' sem tel.':'')+'</div>'+
    '<div style="background:var(--light);border-radius:8px;height:8px;margin-bottom:16px">'+
    '<div style="background:var(--org);height:8px;border-radius:8px;width:'+pct+'%;transition:width .3s"></div></div>'+
    '<div style="font-size:22px;margin-bottom:6px">&#x1F4AC;</div>'+
    '<div style="font-weight:700;font-size:17px;margin-bottom:4px">'+escH(it.nome)+'</div>'+
    '<div style="font-size:12px;color:var(--gray);margin-bottom:20px">'+escH(it.prod)+' · '+it.val+'</div>'+
    '<a href="'+waUrl+'" onclick="setTimeout(function(){window._filaIdx++;abrirProximoWA();},1500)" class="btn btn-pri" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;text-decoration:none;background:#25D366;font-size:16px">'+
    '&#x1F4F2; Enviar para '+escH(it.nome)+'</a>'+
    '<button class="btn btn-sec" onclick="window._filaIdx++;abrirProximoWA()">'+(ultimo?'&#x2705; Concluído':'Pular este &#x27A1;')+'</button>'+
    '</div></div>';
  var ex=document.getElementById('moFila');
  if(ex)ex.outerHTML=html;else document.body.insertAdjacentHTML('beforeend',html);
}

function exportarCSV(){
  var header='Num,Data,Cliente,Produto,Total,Recebido,Pendente,Parcelas,Em Atraso';
  var linhas=[header];
  var t=todayStr();
  vendas.forEach(function(v){
    var cli=clientes.find(function(c){return c.id===v.clienteid;});
    var pv=parcelas.filter(function(p){return p.vendaid===v.id;});
    var recebido=pv.filter(function(p){return p.pago;}).reduce(function(s,p){return s+(p.valor||0);},0);
    var pendente=pv.filter(function(p){return !p.pago;}).reduce(function(s,p){return s+(p.valor||0);},0);
    var atraso=pv.filter(function(p){return !p.pago&&p.vencimento<t;}).length;
    linhas.push([v.numero||'',v.data||'','"'+(cli?cli.nome:'').replace(/"/g,'""')+'"','"'+(v.produto||'').replace(/"/g,'""')+'"',(v.total||0).toFixed(2),recebido.toFixed(2),pendente.toFixed(2),pv.length,atraso].join(','));
  });
  var csv=linhas.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='AgiVendas_'+todayStr()+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},3000);
  toast('CSV exportado com '+vendas.length+' vendas!');
}
